    <style>
      :root {
        color-scheme: light dark;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background-color: #f5f5f4;
        color: rgba(0, 0, 0, 0.5);
        transition: background-color 0.3s ease;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background-color: #1c1917;
          color: rgba(255, 255, 255, 0.75);
        }
      }

      #root {
        min-height: 100vh;
      }

      .boot-shell {
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }

      .boot-card {
        width: min(560px, 100%);
        padding: 32px;
      }

      .boot-eyebrow {
        margin: 0;
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        opacity: 0.5;
        font-family: monospace;
      }

      .boot-title {
        margin: 16px 0 0;
        font-size: 1.5rem;
        font-weight: 700;
        color: #000;
        line-height: 1.2;
      }

      @media (prefers-color-scheme: dark) {
        .boot-title {
          color: #fff;
        }
      }

      .boot-copy {
        margin: 18px 0 0;
        font-size: 0.95rem;
        line-height: 1.6;
        font-family: serif;
      }

      .boot-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .boot-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(0, 0, 0, 0.15);
        border-radius: 4px;
        color: #000;
        padding: 6px 12px;
        font-size: 0.75rem;
        font-weight: 500;
        text-decoration: none;
        transition: all 0.2s ease;
      }

      @media (prefers-color-scheme: dark) {
        .boot-link {
          border-color: rgba(255, 255, 255, 0.2);
          color: #fff;
        }
      }

      .boot-note {
        margin: 24px 0 0;
        font-size: 0.8rem;
        line-height: 1.5;
        opacity: 0.4;
      }
    </style>
  </head>
  <body>
    <div id="root">

          </p>
          <div class="boot-actions">

            <a class="boot-link" href="mailto:kshreyashreddy@gmail.com">Email ↗</a>
            <a class="boot-link" href="https://linkedin.com/in/shreyashreddyk" target="_blank" rel="noopener noreferrer">LinkedIn ↗</a>
          </div>
          <p class="boot-note">
            Building data platforms, retrieval pipelines, and production systems.
          </p>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
